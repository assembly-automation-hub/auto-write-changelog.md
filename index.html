<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Changelog Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --green: #4ade80;
    --yellow: #fbbf24;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,106,155,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  header {
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(124,106,255,0.3);
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 16px;
  }
  h1 {
    font-family: var(--sans);
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 10px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 420px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }
  .card + .card { margin-top: 16px; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .card-header-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-body { padding: 20px; }

  /* ── Fields ── */
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap .prefix {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--muted);
    pointer-events: none;
    user-select: none;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input.has-prefix { padding-left: 90px; }
  input::placeholder { color: var(--muted); opacity: 0.6; }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.12);
  }
  input.valid { border-color: rgba(74,222,128,0.5); }
  input.error { border-color: rgba(255,106,155,0.5); }

  .provider-row {
    display: flex;
    gap: 8px;
  }
  .provider-btn {
    flex: 1;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .provider-btn:hover { border-color: var(--accent); color: var(--text); }
  .provider-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,255,0.08);
    box-shadow: 0 0 0 1px rgba(124,106,255,0.2);
  }
  .provider-icon { font-size: 13px; }


    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    opacity: 0.8;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .btn-primary:hover:not(:disabled) {
    background: #9b8dff;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 11px 16px;
  }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Log ── */
  .log-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .log-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .log-dots { display: flex; gap: 6px; }
  .log-dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .log-dots span:nth-child(1) { background: #ff5f57; }
  .log-dots span:nth-child(2) { background: #febc2e; }
  .log-dots span:nth-child(3) { background: #28c840; }
  .log-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #log {
    padding: 16px;
    font-size: 12px;
    line-height: 1.7;
    color: #a0a0b8;
    min-height: 120px;
    max-height: 280px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { display: flex; gap: 8px; align-items: flex-start; }
  .log-prefix { flex-shrink: 0; }
  .log-info .log-prefix { color: var(--accent); }
  .log-success .log-prefix { color: var(--green); }
  .log-warn .log-prefix { color: var(--yellow); }
  .log-err .log-prefix { color: var(--accent2); }
  .log-err .log-text { color: var(--accent2); }
  .log-success .log-text { color: var(--green); }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 2px;
    background: var(--border);
    overflow: hidden;
    display: none;
  }
  .progress-wrap.active { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(124,106,255,0.6);
  }

  /* ── Status badge ── */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .status.show { opacity: 1; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status.idle { color: var(--muted); border: 1px solid var(--border); }
  .status.running { color: var(--accent); border: 1px solid rgba(124,106,255,0.3); }
  .status.running .status-dot { background: var(--accent); animation: pulse 1s infinite; }
  .status.done { color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
  .status.done .status-dot { background: var(--green); }
  .status.failed { color: var(--accent2); border: 1px solid rgba(255,106,155,0.3); }
  .status.failed .status-dot { background: var(--accent2); }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid rgba(124,106,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="badge">⚡ AI-Powered</div>
    <h1>Changelog<span>.</span>md<br>Generator</h1>
    <p class="subtitle">Автоматически сравнивает два последних релиза и генерирует двуязычные release notes через GPT-4o.</p>
  </header>

  <!-- Credentials card -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-dot"></div>
      <span class="card-title">Credentials</span>
    </div>
    <div class="card-body">
      <div class="field">
        <label>GitHub Token</label>
        <input type="password" id="ghToken" placeholder="ghp_... или github_pat_..." autocomplete="off">
        <p class="hint">Нужны права: <code>repo</code> (contents read/write)</p>
      </div>
      <div class="field">
        <label>AI Provider</label>
        <div class="provider-row">
          <button type="button" class="provider-btn active" data-provider="openai" onclick="selectProvider('openai')">
            <span class="provider-icon">⬡</span> OpenAI
          </button>
          <button type="button" class="provider-btn" data-provider="gemini" onclick="selectProvider('gemini')">
            <span class="provider-icon">✦</span> Gemini
          </button>
          <button type="button" class="provider-btn" data-provider="anthropic" onclick="selectProvider('anthropic')">
            <span class="provider-icon">◈</span> Claude
          </button>
          <button type="button" class="provider-btn" data-provider="github" onclick="selectProvider('github')">
            <span class="provider-icon">⬡</span> GH Models
          </button>
        </div>
      </div>
      <div class="field">
        <label id="aiTokenLabel">OpenAI API Key</label>
        <input type="password" id="aiToken" placeholder="sk-proj-..." autocomplete="off">
        <p class="hint" id="aiTokenHint">GPT-4o · <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--accent)">platform.openai.com</a></p>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Repository</label>
        <div class="input-wrap">
          <span class="prefix">github.com/</span>
          <input type="text" id="repoName" class="has-prefix" placeholder="owner/repo-name" autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <!-- Actions card -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></div>
      <span class="card-title">Actions</span>
      <span class="status idle show" id="status">
        <span class="status-dot" style="background:var(--muted)"></span>
        Idle
      </span>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="card-body">
      <div class="btn-row">
        <button class="btn-primary" id="runBtn" onclick="runProcess()">▶ Run Generator</button>
        <button class="btn-ghost" onclick="clearFields()" title="Очистить поля">✕ Clear</button>
      </div>
    </div>
  </div>

  <!-- Log card -->
  <div class="card">
    <div class="card-header">
      <div class="log-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="log-label">Console Output</span>
    </div>
    <div id="log">Waiting for input...<br></div>
  </div>

</div>

<script>
const logEl     = document.getElementById('log');
const runBtn    = document.getElementById('runBtn');
const statusEl  = document.getElementById('status');
const progWrap  = document.getElementById('progressWrap');
const progBar   = document.getElementById('progressBar');

// ── Provider config ───────────────────────────────────────────────────────────
let currentProvider = 'openai';
const PROVIDERS = {
  openai:    { label: 'OpenAI API Key',      placeholder: 'sk-proj-...',        hint: 'GPT-4o · <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--accent)">platform.openai.com</a>' },
  gemini:    { label: 'Gemini API Key',      placeholder: 'AIza...',            hint: 'gemini-2.0-flash · <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">aistudio.google.com</a>' },
  anthropic: { label: 'Anthropic API Key',   placeholder: 'sk-ant-...',         hint: 'claude-haiku-4-5 · <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--accent)">console.anthropic.com</a>' },
  github:    { label: 'GitHub PAT (Models)', placeholder: 'github_pat_...',     hint: 'GPT-4o via GitHub Models · <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--accent)">github.com/settings/tokens</a> — тот же токен что и выше' }
};

function selectProvider(p) {
  currentProvider = p;
  sessionStorage.setItem('clg_provider', p);
  document.querySelectorAll('.provider-btn').forEach(b => b.classList.toggle('active', b.dataset.provider === p));
  const cfg = PROVIDERS[p];
  document.getElementById('aiTokenLabel').textContent = cfg.label;
  document.getElementById('aiToken').placeholder = cfg.placeholder;
  document.getElementById('aiTokenHint').innerHTML = cfg.hint;
  document.getElementById('aiToken').value = sessionStorage.getItem('clg_aiToken_' + p) || '';
}

// ── Persist fields in sessionStorage ─────────────────────────────────────────
const FIELDS = ['ghToken', 'repoName'];
window.addEventListener('DOMContentLoaded', () => {
  FIELDS.forEach(id => {
    const v = sessionStorage.getItem('clg_' + id);
    if (v) document.getElementById(id).value = v;
  });
  const savedProvider = sessionStorage.getItem('clg_provider') || 'openai';
  selectProvider(savedProvider);
});
FIELDS.forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    sessionStorage.setItem('clg_' + id, e.target.value);
  });
});
document.getElementById('aiToken').addEventListener('input', e => {
  sessionStorage.setItem('clg_aiToken_' + currentProvider, e.target.value);
});

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const icons = { info:'›', success:'✓', warn:'!', err:'✗' };
  const line = document.createElement('div');
  line.className = `log-line log-${type}`;
  line.innerHTML = `<span class="log-prefix">${icons[type]}</span><span class="log-text">${escHtml(msg)}</span>`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function clearLog() { logEl.innerHTML = ''; }

// ── Status / Progress ─────────────────────────────────────────────────────────
function setStatus(state, label) {
  statusEl.className = `status show ${state}`;
  statusEl.innerHTML = `<span class="status-dot"></span>${label}`;
}
function setProgress(pct) {
  progWrap.classList.toggle('active', pct > 0 && pct < 100);
  progBar.style.width = pct + '%';
}

// ── GitHub helper ─────────────────────────────────────────────────────────────
async function gh(path, token, opts = {}) {
  const r = await fetch(`https://api.github.com/repos/${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
  if (!r.ok && r.status !== 404) {
    let msg = `GitHub API ${r.status}`;
    try { const d = await r.json(); msg += `: ${d.message}`; } catch {}
    throw new Error(msg);
  }
  return r;
}

// ── Base64 Unicode helpers ────────────────────────────────────────────────────
function b64Enc(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) =>
    String.fromCharCode(parseInt(p1, 16))
  ));
}
function b64Dec(str) {
  return decodeURIComponent(
    atob(str.replace(/\s/g,'')).split('').map(c =>
      '%' + c.charCodeAt(0).toString(16).padStart(2,'0')
    ).join('')
  );
}

// ── AI call (multi-provider) ──────────────────────────────────────────────────
async function callAI(provider, apiKey, previousTag, currentTag, diffText) {
  const systemPrompt = 'You are a professional technical writer and translator. Return valid JSON only, no markdown, no backticks.';
  const userPrompt =
`Analyze the code diff below (changes between version ${previousTag} and ${currentTag}).
Return ONLY a raw JSON object with these exact keys:
"en_improvements": list of strings — key improvements, features, fixes (English, user-facing)
"ru_improvements": list of strings — exact Russian translation of en_improvements

Focus on business and user-facing impact. Be concise.

Diff:
${diffText}`;

  // ── OpenAI ──
  if (provider === 'openai') {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o',
        temperature: 0.1,
        response_format: { type: 'json_object' },
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userPrompt }
        ]
      })
    });
    if (!r.ok) {
      let m = `OpenAI ${r.status}`;
      try { const d = await r.json(); m += `: ${d.error?.message}`; } catch {}
      throw new Error(m);
    }
    const d = await r.json();
    return JSON.parse(d.choices[0].message.content.trim());
  }

  // ── Google Gemini ──
  if (provider === 'gemini') {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        generationConfig: { responseMimeType: 'application/json', temperature: 0.1 },
        contents: [{ parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }]
      })
    });
    if (!r.ok) {
      let m = `Gemini ${r.status}`;
      try { const d = await r.json(); m += `: ${d.error?.message}`; } catch {}
      throw new Error(m);
    }
    const d = await r.json();
    const raw = d.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
    if (!raw) throw new Error('Gemini returned empty response');
    return JSON.parse(raw.replace(/^```json|```$/g, '').trim());
  }

  // ── Anthropic Claude ──
  if (provider === 'anthropic') {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        temperature: 0.1,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    if (!r.ok) {
      let m = `Anthropic ${r.status}`;
      try { const d = await r.json(); m += `: ${d.error?.message}`; } catch {}
      throw new Error(m);
    }
    const d = await r.json();
    const raw = d.content?.[0]?.text?.trim();
    if (!raw) throw new Error('Claude returned empty response');
    return JSON.parse(raw.replace(/^```json|```$/g, '').trim());
  }

  // ── GitHub Models (OpenAI-compatible endpoint) ──
  if (provider === 'github') {
    const r = await fetch('https://models.inference.ai.azure.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o',
        temperature: 0.1,
        response_format: { type: 'json_object' },
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userPrompt }
        ]
      })
    });
    if (!r.ok) {
      let m = `GitHub Models ${r.status}`;
      try { const d = await r.json(); m += `: ${d.error?.message ?? JSON.stringify(d)}`; } catch {}
      throw new Error(m);
    }
    const d = await r.json();
    return JSON.parse(d.choices[0].message.content.trim());
  }

  throw new Error('Unknown provider: ' + provider);
}

// ── Clear ─────────────────────────────────────────────────────────────────────
function clearFields() {
  ['ghToken','repoName'].forEach(id => {
    document.getElementById(id).value = '';
    sessionStorage.removeItem('clg_' + id);
  });
  document.getElementById('aiToken').value = '';
  Object.keys(PROVIDERS).forEach(p => sessionStorage.removeItem('clg_aiToken_' + p));
  clearLog();
  log('Fields cleared.', 'warn');
  setStatus('idle', 'Idle');
  setProgress(0);
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function runProcess() {
  clearLog();

  const ghToken  = document.getElementById('ghToken').value.trim();
  const aiToken  = document.getElementById('aiToken').value.trim();
  const repoName = document.getElementById('repoName').value.trim().replace(/^(https?:\/\/)?(www\.)?github\.com\//i, '');

  if (!ghToken || !aiToken || !repoName) {
    log('Fill in all fields before running.', 'err');
    return;
  }

  runBtn.disabled = true;
  setStatus('running', '<span class="spinner"></span>Running');
  setProgress(5);

  try {
    // Step 1 — releases
    log('Fetching releases…');
    const relRes  = await gh(`${repoName}/releases`, ghToken);
    const releases = await relRes.json();
    if (!Array.isArray(releases) || releases.length < 2)
      throw new Error(`Need at least 2 published releases. Found: ${releases.length ?? 0}`);

    const currentTag  = releases[0].tag_name;
    const previousTag = releases[1].tag_name;
    log(`Latest: ${currentTag}  ←  Previous: ${previousTag}`, 'success');
    setProgress(20);

    // Step 2 — check existing changelog
    log('Checking Changelog.md…');
    let existingContent = '', existingSha = null;
    const fileRes = await gh(`${repoName}/contents/Changelog.md`, ghToken);
    if (fileRes.status === 200) {
      const fd = await fileRes.json();
      existingContent = b64Dec(fd.content);
      existingSha = fd.sha;
      if (existingContent.includes(`Version ${currentTag}`) || existingContent.includes(`Версия ${currentTag}`)) {
        log(`Entry for ${currentTag} already exists. Nothing to do.`, 'warn');
        setStatus('done', 'Up to date');
        setProgress(0);
        runBtn.disabled = false;
        return;
      }
      log('Existing Changelog.md found — will prepend.');
    } else {
      log('Changelog.md not found — will create new file.', 'warn');
    }
    setProgress(35);

    // Step 3 — diff
    log(`Loading diff ${previousTag}...${currentTag}…`);
    const cmpRes = await gh(`${repoName}/compare/${previousTag}...${currentTag}`, ghToken);
    const cmp    = await cmpRes.json();

    const EXCLUDE = ['.lock','-lock.json','.svg','.png','.jpg','.jpeg','.gif','.ico','.min.js','.woff','.woff2','.ttf','.eot'];
    let diffText = '';
    let skipped  = 0;

    for (const f of (cmp.files || [])) {
      if (EXCLUDE.some(ext => f.filename.endsWith(ext))) { skipped++; continue; }

      // Even if patch is missing, record the file status so AI knows what changed
      if (!f.patch) {
        diffText += `File: ${f.filename}  [${f.status}${f.additions ? ` +${f.additions}` : ''}${f.deletions ? ` -${f.deletions}` : ''}]\n\n`;
        continue;
      }
      diffText += `File: ${f.filename}\nPatch:\n${f.patch}\n\n`;
      if (diffText.length > 80_000) { diffText += '\n[Diff truncated...]'; break; }
    }

    const totalFiles = (cmp.files || []).length;
    log(`${totalFiles} file(s) changed  •  ${skipped} binary/ignored skipped  •  ${Math.round(diffText.length / 1024)} KB diff`, 'success');

    if (diffText.trim().length < 20) {
      log('No meaningful diff found. Skipping.', 'warn');
      setStatus('done', 'No changes');
      setProgress(0);
      runBtn.disabled = false;
      return;
    }
    setProgress(50);

    // Step 4 — AI
    const providerLabel = PROVIDERS[currentProvider].label.replace(' API Key','');
    log(`Sending diff to ${providerLabel}…`);
    const result = await callAI(currentProvider, aiToken, previousTag, currentTag, diffText);
    log(`${providerLabel} response received.`, 'success');
    setProgress(75);

    // Step 5 — build markdown
    const enItems = result.en_improvements || [];
    const ruItems = result.ru_improvements || [];

    let entry  = `## EN: Release Notes — Version ${currentTag}\n`;
    entry += `### Key Improvements:\n`;
    entry += enItems.length ? enItems.map(i => `- ${i}`).join('\n') : '- No significant changes.';
    entry += '\n\n---\n\n';
    entry += `## RU: Release Notes — Версия ${currentTag}\n`;
    entry += `### Основные улучшения:\n`;
    entry += ruItems.length ? ruItems.map(i => `- ${i}`).join('\n') : '- Нет значительных изменений.';
    entry += '\n\n---\n\n';

    const finalContent = entry + existingContent;
    setProgress(88);

    // Step 6 — push
    log('Pushing Changelog.md to GitHub…');
    const putBody = {
      message: `docs: auto-update Changelog.md for ${currentTag}`,
      content: b64Enc(finalContent)
    };
    if (existingSha) putBody.sha = existingSha;

    const putRes = await fetch(`https://api.github.com/repos/${repoName}/contents/Changelog.md`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${ghToken}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(putBody)
    });

    if (!putRes.ok) {
      let m = `GitHub write ${putRes.status}`;
      try { const d = await putRes.json(); m += `: ${d.message}`; } catch {}
      throw new Error(m);
    }

    setProgress(100);
    log(`Changelog.md updated for ${currentTag} 🎉`, 'success');
    log(`${enItems.length} EN improvement(s)  •  ${ruItems.length} RU improvement(s)`, 'success');
    setStatus('done', 'Done');
    setTimeout(() => setProgress(0), 1400);

  } catch (err) {
    log(`ERROR: ${err.message}`, 'err');
    setStatus('failed', 'Failed');
    setProgress(0);
  } finally {
    runBtn.disabled = false;
  }
}
</script>
