<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Changelog Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f6f8fa; color: #24292f; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 24px; width: 100%; max-width: 600px; box-shadow: 0 3px 6px rgba(140,149,159,0.15); }
        h1 { font-size: 20px; margin-top: 0; margin-bottom: 16px; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 5px 12px; font-size: 14px; line-height: 20px; color: #24292f; vertical-align: middle; background-color: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; box-sizing: border-box; margin-bottom: 16px; }
        button { background-color: #2da44e; color: #fff; border: 1px solid rgba(27,31,36,0.15); border-radius: 6px; padding: 5px 16px; font-size: 14px; font-weight: 500; line-height: 20px; cursor: pointer; width: 100%; box-sizing: border-box; }
        button:hover { background-color: #2c974b; }
        button:disabled { background-color: #94d3a2; cursor: not-allowed; }
        #log { margin-top: 20px; padding: 10px; background: #0d1117; color: #c9d1d9; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор Changelog.md</h1>
    
    <label for="ghToken">GitHub Token (с правами repo)</label>
    <input type="password" id="ghToken" placeholder="ghp_...">
    
    <label for="aiToken">OpenAI API Key</label>
    <input type="password" id="aiToken" placeholder="sk-...">
    
    <label for="repoName">Репозиторий (owner/repo)</label>
    <input type="text" id="repoName" placeholder="например, Andrii/my-project">
    
    <button id="runBtn" onclick="runProcess()">Проверить и обновить Changelog</button>
    
    <div id="log">Ожидание запуска...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    const runBtn = document.getElementById('runBtn');

    function log(message) {
        console.log(message);
        logEl.textContent += `\n> ${message}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Безопасное кодирование и декодирование Base64 с поддержкой кириллицы (UTF-8)
    function b64EncodeUnicode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function toSolidBytes(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));
    }
    function b64DecodeUnicode(str) {
        return decodeURIComponent(atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    }

    async function fetchGH(url, token, options = {}) {
        const headers = {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
        };
        const response = await fetch(`https://api.github.com/repos/${url}`, { ...options, headers });
        if (!response.ok && response.status !== 404) {
            throw new Error(`GitHub API Error: ${response.status} ${response.statusText}`);
        }
        return response;
    }

    async function runProcess() {
        logEl.textContent = "Начало работы...";
        runBtn.disabled = true;

        const ghToken = document.getElementById('ghToken').value.trim();
        const aiToken = document.getElementById('aiToken').value.trim();
        const repoName = document.getElementById('repoName').value.trim();

        if (!ghToken || !aiToken || !repoName) {
            log("Ошибка: Заполните все поля.");
            runBtn.disabled = false;
            return;
        }

        try {
            // 1. Получаем релизы
            log("Получение списка релизов...");
            const releasesRes = await fetchGH(`${repoName}/releases`, ghToken);
            const releases = await releasesRes.json();

            if (releases.length < 2) {
                log("Нужно как минимум 2 релиза для сравнения.");
                runBtn.disabled = false;
                return;
            }

            const currentTag = releases[0].tag_name;
            const previousTag = releases[1].tag_name;
            log(`Сравниваем релизы: ${previousTag} -> ${currentTag}`);

            // 2. Получаем Changelog.md
            log("Проверка файла Changelog.md...");
            let changelogContent = "";
            let changelogSha = null;
            
            const fileRes = await fetchGH(`${repoName}/contents/Changelog.md`, ghToken);
            if (fileRes.status === 200) {
                const fileData = await fileRes.json();
                changelogContent = b64DecodeUnicode(fileData.content);
                changelogSha = fileData.sha;
                
                // Проверяем, есть ли уже запись
                if (changelogContent.includes(`## EN: Release Notes — Version ${currentTag}`) || 
                    changelogContent.includes(`## EN: Release Notes — Версия ${currentTag}`)) {
                    log(`Запись для версии ${currentTag} уже существует. Остановка.`);
                    runBtn.disabled = false;
                    return;
                }
            } else {
                log("Файл Changelog.md не найден. Будет создан новый.");
            }

            // 3. Получаем Diff
            log("Загрузка изменений кода (diff)...");
            const compareRes = await fetchGH(`${repoName}/compare/${previousTag}...${currentTag}`, ghToken);
            const compareData = await compareRes.json();
            
            let diffText = "";
            const excludeExt = ['.lock', '-lock.json', '.svg', '.png', '.jpg', '.min.js'];

            if (compareData.files) {
                for (const file of compareData.files) {
                    if (excludeExt.some(ext => file.filename.endsWith(ext))) continue;
                    if (!file.patch) continue;
                    
                    diffText += `File: ${file.filename}\nPatch:\n${file.patch}\n\n`;
                    if (diffText.length > 80000) {
                        diffText += "\n[Diff truncated...]";
                        break;
                    }
                }
            }

            if (diffText.trim().length < 50) {
                log("Изменения слишком малы или отсутствуют. Остановка.");
                runBtn.disabled = false;
                return;
            }

            // 4. Отправка в OpenAI
            log("Генерация описания через GPT-4o...");
            const promptContext = `Return only a raw JSON object with no markdown formatting. The JSON must have these exact keys:
"en_improvements": list of strings (describe key improvements, new features, changed logic, or fixes in English),
"ru_improvements": list of strings (provide the exact Russian translation of the 'en_improvements' list)

Write clearly, concisely, and focus on the BUSINESS and LOGIC impact of the code changes.

Changes between ${previousTag} and ${currentTag}:
${diffText}`;

            const aiRes = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${aiToken}`
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    temperature: 0.1,
                    response_format: { type: "json_object" },
                    messages: [
                        { role: "system", content: "You are a professional technical writer and translator. Always return valid JSON only." },
                        { role: "user", content: promptContext }
                    ]
                })
            });

            if (!aiRes.ok) throw new Error("Ошибка API OpenAI");
            const aiData = await aiRes.json();
            const resultObj = JSON.parse(aiData.choices[0].message.content.trim());

            // 5. Формирование нового текста
            log("Сборка Markdown...");
            let newEntry = `## EN: Release Notes — Version ${currentTag}\n### Key Improvements:**\n`;
            
            if (resultObj.en_improvements && resultObj.en_improvements.length > 0) {
                resultObj.en_improvements.forEach(item => newEntry += `- ${item}\n`);
            } else {
                newEntry += `- No significant changes.\n`;
            }

            newEntry += `\n---\n\n## RU: Release Notes — Версия ${currentTag}\n### Основные улучшения:**\n`;
            
            if (resultObj.ru_improvements && resultObj.ru_improvements.length > 0) {
                resultObj.ru_improvements.forEach(item => newEntry += `- ${item}\n`);
            } else {
                newEntry += `- Нет значительных изменений.\n`;
            }

            newEntry += `\n\n`;
            const finalContent = newEntry + changelogContent;

            // 6. Пуш в репозиторий
            log("Отправка обновленного Changelog.md в GitHub...");
            const putBody = {
                message: `docs: auto-update Changelog.md for release ${currentTag}`,
                content: b64EncodeUnicode(finalContent)
            };
            if (changelogSha) {
                putBody.sha = changelogSha;
            }

            const putRes = await fetch(`https://api.github.com/repos/${repoName}/contents/Changelog.md`, {
                method: "PUT",
                headers: {
                    'Authorization': `token ${ghToken}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(putBody)
            });

            if (putRes.ok) {
                log("Успех! Changelog.md обновлен.");
            } else {
                throw new Error("Не удалось обновить файл в репозитории.");
            }

        } catch (error) {
            log(`КРИТИЧЕСКАЯ ОШИБКА: ${error.message}`);
        } finally {
            runBtn.disabled = false;
        }
    }
</script>
</body>
</html>
