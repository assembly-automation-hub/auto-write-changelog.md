name: AI Changelog Generator

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai PyGithub

      - name: Run changelog generator
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_TAG: ${{ github.event.release.tag_name }}
        run: python generate_changelog.py

      - name: Commit and push Changelog.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Changelog.md
          git diff --staged --quiet || git commit -m "docs: auto-update Changelog.md for ${{ github.event.release.tag_name }}"
          git push
